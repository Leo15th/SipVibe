<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Page</title>
    <link rel="stylesheet" href="userStyle.css">
</head>

<body>
    <nav>
        <div id="userProfileDisplay">
            <img src="assets/blankProfile.jpg" alt="">
            <span id="userNameSpan">User Name</span>
        </div>
        <div id="cartContainer">
            <div id="cartIconContainer">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Setting</span>
            </div>
            <div id="cartCountContainer">
                <span id="cartCount"></span>
            </div>
        </div>
    </nav>

    <section id="tabCategorySection">
        <div id="categoryBtnsContainer">
            <button class="tabBtn active" onclick="opentab(event, 'Shake')">Shake</button>
            <button class="tabBtn" onclick="opentab(event, 'Smoothie')">Smoothie</button>
            <button class="tabBtn" onclick="opentab(event, 'Boba')">Boba</button>
            <button class="tabBtn" onclick="opentab(event, 'Mocktail')">Mocktail</button>
            <button class="tabBtn" onclick="opentab(event, 'Coffee')">Coffee</button>
            <button class="tabBtn" onclick="opentab(event, 'Tea')">Tea</button>
        </div>

        <div id="tabContentHolder">
            <div id="Shake" class="tabContent active">
                here will have the shake items
            </div>
            <div id="Smoothie" class="tabContent">
                here will have the smoothie items
            </div>
            <div id="Boba" class="tabContent">
                here will have the boba items
            </div>
            <div id="Mocktail" class="tabContent">
                here will have the mocktail items
            </div>
            <div id="Coffee" class="tabContent">
                here will have the coffee items
            </div>
            <div id="Tea" class="tabContent">
                here will have the tea items
            </div>
        </div>
    </section>




    <div id="test">
        <button id="atcBtn">add to cart</button>
        <button id="rfcBtn">remove from cart</button>
    </div>

    <script src="https://kit.fontawesome.com/b04755df1d.js" crossorigin="anonymous"></script>
    <script src="js/auth.js"></script>
    <script src="js/userPage.js"></script>
</body>

</html>
