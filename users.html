<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Page</title>
    <link rel="stylesheet" href="userStyle.css">
</head>

<body>
    <nav>
        <div id="userProfileDisplay">
            <img src="assets/blankProfile.jpg" alt="">
            <span id="userNameSpan">User Name</span>
        </div>
        <div id="cartAndSetting">
            <div id="cartContainer">
                <div id="cartIconContainer">
                    <i class="fa-solid fa-cart-shopping"></i>
                </div>
                <div id="cartCountContainer">
                    <span id="cartCount"></span>
                </div>
            </div>
            <div id="settingContainer">
                <i class="fa-solid fa-gear"></i>
                <div id="sideSettingContainer">
                    
                </div>
            </div>
        </div>
    </nav>

    <section id="tabCategorySection">
        <div id="categoryBtnsContainer">
            <button class="tabBtn active" data-category="Shake" onclick="opentab(event, 'Shake')">Shake</button>
            <button class="tabBtn" data-category="Smoothie" onclick="opentab(event, 'Smoothie')">Smoothie</button>
            <button class="tabBtn" data-category="Boba" onclick="opentab(event, 'Boba')">Boba</button>
            <button class="tabBtn" data-category="Mocktail" onclick="opentab(event, 'Mocktail')">Mocktail</button>
            <button class="tabBtn" data-category="Coffee" onclick="opentab(event, 'Coffee')">Coffee</button>
            <button class="tabBtn" data-category="Tea" onclick="opentab(event, 'Tea')">Tea</button>
        </div>

        <div id="tabContentHolder">
            <div id="Shake" class="tabContent active">

            </div>
            <div id="Smoothie" class="tabContent">
                here will have the smoothie items
            </div>
            <div id="Boba" class="tabContent">
                here will have the boba items
            </div>
            <div id="Mocktail" class="tabContent">
                here will have the mocktail items
            </div>
            <div id="Coffee" class="tabContent">
                here will have the coffee items
            </div>
            <div id="Tea" class="tabContent">
                here will have the tea items
            </div>
        </div>
    </section>

    <script src="https://kit.fontawesome.com/b04755df1d.js" crossorigin="anonymous"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/userPage.js"></script>
</body>

</html>
