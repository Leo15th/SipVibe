<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tab Categories Example</title>
  <style>
    /* Tab buttons */
    .tab {
      display: flex;
      border-bottom: 2px solid #ccc;
    }
    .tab button {
      background: none;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 16px;
    }
    .tab button.active {
      border-bottom: 3px solid #0078d7;
      font-weight: bold;
    }

    /* Tab content */
    .tabcontent {
      display: none;
      padding: 20px;
      border: 1px solid #ccc;
      border-top: none;
    }
    .tabcontent.active {
      display: block;
    }
  </style>
</head>
<body>

<h2>Tabbed Categories</h2>

<div class="tab">
  <button class="tablinks active" onclick="openTab(event, 'Home')">Home</button>
  <button class="tablinks" onclick="openTab(event, 'Profile')">Profile</button>
  <button class="tablinks" onclick="openTab(event, 'Settings')">Settings</button>
</div>

<div id="Home" class="tabcontent active">
  <h3>Home</h3>
  <p>Welcome to the home tab!</p>
</div>

<div id="Profile" class="tabcontent">
  <h3>Profile</h3>
  <p>Here’s your profile information.</p>
</div>

<div id="Settings" class="tabcontent">
  <h3>Settings</h3>
  <p>Adjust your preferences here.</p>
</div>

<script>
function openTab(evt, tabName) {
  // Hide all tab content
  const tabcontent = document.querySelectorAll(".tabcontent");
  tabcontent.forEach(tc => tc.classList.remove("active"));

  // Remove active class from all buttons
  const tablinks = document.querySelectorAll(".tablinks");
  tablinks.forEach(tl => tl.classList.remove("active"));

  // Show the selected tab
  document.getElementById(tabName).classList.add("active");
  evt.currentTarget.classList.add("active");
}
</script>

</body>
</html>
