<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .Ordereditem{
            background-color: antiquewhite;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
        }
    </style>
</head>
<body>
    <div><button>Go Back</button></div>
    <div>
        <div class="Ordereditem">
            <div class="imageContainer">
                <img src="assets/menuItems/appleShake.jpg" alt="">
            </div>
            <div class="description">
                <p>Apple Shake</p>
                <div class="descriptionBottom">
                    <div class="priceContainer">$ 2.5</div>
                    <div class="adjustQuantityContainer">
                        <button>-</button>
                        <span>3</span>
                        <button>+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
